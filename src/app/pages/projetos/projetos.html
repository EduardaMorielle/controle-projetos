<div class="container">
  <header class="header">
    <h1>Meus Projetos</h1>
    <div class="stats">
      <span>Total: {{ total() }}</span>
      <span>Em Andamento: {{ emAndamento() }}</span>
    </div>
  </header>

  @if (projetos().length === 0) {
    <div class="empty-state">
      <mat-icon class="empty-icon">assignment</mat-icon>
      <h3>Nenhum projeto</h3>
      <p>Crie seu primeiro projeto!</p>
    </div>
  }

  <div class="actions">
    <button mat-raised-button color="primary" (click)="adicionar()">
      <mat-icon>add</mat-icon>
      Novo Projeto
    </button>
  </div>

  <section class="grid">
    @for (projeto of projetos(); track projeto.id) {
      <app-projeto-card
        [titulo]="projeto.titulo"
        [area]="projeto.area"
        [status]="projeto.status"
        [descricao]="projeto.descricao" />
    }
  </section>
</div>
